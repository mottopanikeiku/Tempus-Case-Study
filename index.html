function escapeHtml(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function formatAiText(text) {
  return escapeHtml(text).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
}

function buildClaudeRequestPayload(userPrompt, temperature = 0.5, sourceIds = []) {
  return {
    model: CONFIG.model,
    max_tokens: CONFIG.maxTokens,
    system: buildSystemPrompt(),
    messages: [{ role: "user", content: `REFERENCE PACK:\n${buildReferencePacket(sourceIds)}\n\nTASK:\n${userPrompt}` }],
    stream: true,
    temperature
  };
}

async function readClaudeStreamResponse(response, targetEl) {
  if (!response.ok) {
    const err = await response.text();
    streamController = null;
    throw new Error(`API error ${response.status}: ${err.slice(0, 200)}`);
  }

  if (!response.body) {
    const text = await response.text();
    streamController = null;
    targetEl.innerHTML = formatAiText(text);
    return text;
  }

  targetEl.innerHTML = '<span class="streaming-cursor"></span>';
  let fullText = "";
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop() || "";
    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const data = line.slice(6);
      if (data === "[DONE]") continue;
      try {
        const event = JSON.parse(data);
        if (event.type === "content_block_delta" && event.delta?.text) {
          fullText += event.delta.text;
          targetEl.innerHTML = formatAiText(fullText) + '<span class="streaming-cursor"></span>';
        }
      } catch (error) {
        /* ignore keepalive lines */
      }
    }
  }

  streamController = null;
  targetEl.innerHTML = formatAiText(fullText);
  return fullText;
}

async function streamClaudeViaProxy(payload, targetEl) {
  const response = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      anthropic_version: CONFIG.apiVersion,
      ...payload
    }),
    signal: streamController.signal
  });
  return readClaudeStreamResponse(response, targetEl);
}

async function streamClaudeViaBrowserKey(payload, targetEl) {
  const apiKey = getApiKey();
  if (!apiKey) return "";
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": CONFIG.apiVersion,
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify(payload),
    signal: streamController.signal
  });
  return readClaudeStreamResponse(response, targetEl);
}

function handleClaudeConnectionFailure(error) {
  streamController = null;
  if (connectionState.mode === "proxy") {
    connectionState.mode = "demo";
    connectionState.proxyAvailable = false;
    connectionState.proxyMessage = error.message || "Claude proxy unavailable.";
    updateApiStatus();
  } else if (connectionState.mode === "manual" && /401|403/.test(String(error.message || ""))) {
    clearStoredManualApiKey();
    connectionState.mode = "demo";
    updateApiStatus();
  }
}

async function streamClaude(userPrompt, targetEl, temperature = 0.5, sourceIds = []) {
  if (!isClaudeConnected()) return "";
  abortStream();
  streamController = new AbortController();
  const payload = buildClaudeRequestPayload(userPrompt, temperature, sourceIds);
  return connectionState.mode === "proxy"
    ? streamClaudeViaProxy(payload, targetEl)
    : streamClaudeViaBrowserKey(payload, targetEl);
}

async function generateWithFallback({ cacheKey, prompt, targetEl, temperature, sourceIds, localText, forceRefresh = false }) {
  const cached = !forceRefresh ? getCachedContent(cacheKey) : null;
  if (cached) {
    targetEl.innerHTML = formatAiText(cached.text);
    return cached;
  }
  const guardrailHits = getPromptGuardrailHits(prompt);
  if (guardrailHits.length) {
    console.warn("Prompt guardrail blocked suspicious content", guardrailHits);
    targetEl.innerHTML = formatAiText(localText);
    showToast(`Guardrails blocked suspicious prompt content: ${guardrailHits[0]}`);
    return setCachedContent(cacheKey, { text:localText, sourceIds, mode:"guardrail_blocked", guardrailHits });
  }
  if (!isClaudeConnected()) {
    targetEl.innerHTML = formatAiText(localText);
    return setCachedContent(cacheKey, { text:localText, sourceIds, mode:"local" });
  }
  try {
    const aiText = await streamClaude(prompt, targetEl, temperature, sourceIds);
    const payload = { text:aiText || localText, sourceIds, mode:aiText ? "ai" : "local" };
    if (!aiText) targetEl.innerHTML = formatAiText(localText);
    return setCachedContent(cacheKey, payload);
  } catch (error) {
    if (error.name === "AbortError") return { text:"", sourceIds, mode:"aborted" };
    handleClaudeConnectionFailure(error);
    targetEl.innerHTML = formatAiText(localText);
    showToast("Claude unavailable - using local draft");
    return setCachedContent(cacheKey, { text:localText, sourceIds, mode:"local" });
  }
}

function copyTextValue(text, message = "Copied to clipboard") {
  navigator.clipboard.writeText(text);
  showToast(message);
}

function copyGeneratedContent(cacheKey, message = "Copied to clipboard") {
  const item = getCachedContent(cacheKey);
  if (item) copyTextValue(item.text.replace(/\*\*/g, ""), message);
}

function buildPriorityRationaleLocal(p) {
  const playbook = p.playbook || getProviderPlaybook(p);
  return `${p.name} sits at ${p.score}/100 because this account combines ${p.est_genomic_eligible} genomic-eligible patients per month with ${p.competitor_volume} tests still going to ${p.primary_competitor}. ${playbook.whyNow} ${playbook.tempusAngle}`;
}

function buildObjectionEvidence(p, ix) {
  const snippets = [];
  if (ix.objections.includes("turnaround_time")) snippets.push(isHemeProvider(p) ? `Tempus positions comprehensive therapy selection as a streamlined ordering workflow for hematologic malignancies, and xR adds whole-transcriptome RNA sequencing with clinically relevant fusion reporting across more than 100 targeted genes.` : `Tempus positions xF as a 105-gene liquid biopsy that can move quickly from blood collection, and public oncology materials describe solid-tumor genomic profiling workflows as typically reporting in about 10-14 days after specimen receipt.`);
  if (ix.objections.includes("cost_reimbursement")) snippets.push(`Tempus supports Medicare and commercial reimbursement workflows and financial assistance pathways.`);
  if (ix.objections.includes("competitor_loyalty")) snippets.push(getCompetitiveAngle(p));
  if (ix.objections.includes("report_complexity")) snippets.push(`Tempus reporting is built to surface treatment and trial options, not just a long variant list.`);
  if (ix.objections.includes("clinical_utility_skepticism")) snippets.push(`xR reports clinically relevant fusions across more than 100 targeted genes, and public Tempus oncology materials say DNA + RNA sequencing identified 21% more patients with driver fusions eligible for FDA-approved targeted therapies than DNA sequencing alone.`);
  if (ix.objections.includes("specimen_requirements")) snippets.push(`If tissue logistics are the blocker, xF only needs two Streck tubes and can start the workup from blood.`);
  if (ix.objections.includes("needs_comparison_data")) snippets.push(`Tempus can show the side-by-side story: xT for 648-gene tissue DNA, xR when RNA matters, and TIME when the question is where the patient can go next.`);
  return snippets.join(" ");
}

function buildObjectionResponseLocal(p, ix) {
  if (!ix.objections.length) {
    return `**Acknowledge**: We already have momentum here, so I would not reopen old concerns.\n**Evidence**: The better move is to anchor on the progress in the note and reinforce the Tempus value that mattered most.\n**Bridge**: ${ix.next_steps[0] || "Could we lock in the next concrete step while interest is still warm?"}`;
  }
  return `**Acknowledge**: ${ix.objections.includes("turnaround_time") ? "That timing concern is fair, especially when treatment decisions are moving quickly." : "That concern is reasonable, and it is exactly the part of the workflow we should pressure-test."}\n**Evidence**: ${buildObjectionEvidence(p, ix)}\n**Bridge**: ${ix.next_steps[0] || "Would it make sense to pressure-test this on the next few appropriate patients?"}`;
}

function buildIntroScriptLocal(p) {
  const products = getRelevantProducts(p);
  const lead = p.recent_publications.length ? `I saw your recent work on ${p.recent_publications[0].toLowerCase()}` : `You are seeing a meaningful volume of ${p.top_cancer_types[0].toLowerCase()} patients`;
  const productLine = isHemeProvider(p)
    ? `For hematologic accounts like yours, Tempus can streamline ordering through its comprehensive therapy selection workflow and use xR whole-transcriptome RNA sequencing when fusion or splice biology matters.`
    : products.includes("xF")
    ? `For accounts like yours, Tempus can start with xF, the public 105-gene liquid biopsy workflow, then add xT or xR when tissue and RNA detail matter.`
    : `For accounts like yours, Tempus usually leads with xT CDx and adds xR when fusion biology or RNA signal matters.`;
  return `${p.name}, ${lead}. ${productLine} The reason I thought you were worth a quick look is that ${getWhyNow(p).toLowerCase()} If it is useful, we can keep it simple and review one disease-specific use case plus a low-friction pilot idea next week.`;
}

function buildMeetingScriptLocal(p, tone) {
  const playbook = p.playbook || getProviderPlaybook(p);
  const last = getLatestInteraction(p);
  const products = getRelevantProducts(p);
  const opener = last
    ? `Last time we spoke, you flagged ${last.note.slice(0, 58).replace(/"/g, "").trim().replace(/[,:;]?\s*$/, "")}.`
    : `I wanted to make this relevant quickly for your ${p.top_cancer_types[0].toLowerCase()} patients.`;
  const metricLine = isHemeProvider(p)
    ? `Tempus can streamline hematologic ordering and use xR when fusion or splice biology matters.`
    : products.includes("xF")
    ? `Tempus can start with xF from blood, then expand to xT or xR when you need broader DNA or RNA detail.`
    : `Tempus can lead with xT CDx and add xR when RNA fusion biology matters.`;
  const ask = (playbook.nextBestAction || "set up a brief follow-up").replace(/\.$/, "");
  if (tone === "Conversational / Relationship") {
    return `${opener} I think this matters now because ${playbook.whyNow.toLowerCase()} ${metricLine} If it would help, we can ${ask.toLowerCase()}.`;
  }
  if (tone === "Direct / Business Case") {
    return `${opener} You still have ${p.competitor_volume} tests a month with ${p.primary_competitor}, so this is a real conversion opportunity. ${metricLine} The goal today is simple: ${playbook.meetingObjective.toLowerCase()}.`;
  }
  return `${opener} The reason I am bringing Tempus up now is that ${playbook.whyNow.toLowerCase()} ${metricLine} Would it be worth a short follow-up so we can ${ask.toLowerCase()}?`;
}

function buildWeekPlanLocal() {
  const topProviders = rankedProviders.slice(0, 7);
  const buckets = {};
  topProviders.forEach(provider => {
    buckets[provider.hospital_system] = buckets[provider.hospital_system] || [];
    buckets[provider.hospital_system].push(provider);
  });
  const systems = Object.values(buckets).sort((a, b) => b[0].score - a[0].score);
  const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
  return days.map((day, index) => {
    const cluster = systems[index % systems.length] || [];
    const visits = cluster.slice(0, 2);
    const visitLine = visits.length
      ? visits.map(provider => `**${provider.name}** (${provider.hospital_system}) - ${provider.playbook.nextBestAction}`).join("\n")
      : "Follow-up block for open pilots and internal coordination.";
    return `**${day}**\n${visitLine}\nAfternoon: follow-up calls, emails, and prep for the next tumor board or pilot checkpoint.`;
  }).join("\n\n");
}

function generatePriorityRationale(p) {
  const targetEl = document.getElementById("ai-rationale-content");
  if (!targetEl) return;
  const stakeholder = getStakeholderProfile(p);
  const playbook = p.playbook || getProviderPlaybook(p);
  const sourceIds = playbook.sourceIds;
  const cacheKey = getCacheKey("rationale", p.id);
  const prompt = renderPromptTemplate(AI_ASSETS.priorityRationalePrompt, {
    provider_name: p.name,
    provider_title: p.title,
    provider_institution: p.institution,
    stakeholder_type: stakeholder.badge,
    priority_score: `${p.score}/100`,
    why_now: getWhyNow(p),
    next_best_action: playbook.nextBestAction
  });
  generateWithFallback({
    cacheKey,
    prompt,
    targetEl,
    temperature:CONFIG.temps.rationale,
    sourceIds,
    localText:buildPriorityRationaleLocal(p)
  }).then(result => {
    if (!result.text) return;
    renderActionFooter("ai-rationale-footer", sourceIds, [
      `<button class="btn" onclick="copyGeneratedContent('${cacheKey}', 'Rationale copied')">Copy Rationale</button>`
    ]);
  });
}

      <div class="helper-text">Editable rep draft grounded in the tagged CRM note and evidence used below.</div>
      <div class="ai-content" id="ai-obj-content-${noteIdx}"></div>
      <div id="ai-obj-footer-${noteIdx}"></div>

    provider_name: p.name,

    next_step: ix.next_steps[0] || "advance the account"
  });
  generateWithFallback({
    cacheKey,
    prompt,
    targetEl:document.getElementById(`ai-obj-content-${noteIdx}`),

    sourceIds,
    localText:buildObjectionResponseLocal(p, ix)
  }).then(result => {
    if (!result.text) return;
    renderActionFooter(`ai-obj-footer-${noteIdx}`, sourceIds, [
      `<button class="btn" onclick="copyGeneratedContent('${cacheKey}', 'Response copied')">Copy Draft</button>`
    ]);
  });
}

function renderScriptResult(text, sourceIds, tone) {
  const outputEl = document.getElementById("script-output");
  if (!outputEl) return;
  outputEl.innerHTML = `
    <div class="ai-section" style="margin-top:16px">
      <div class="ai-label">Suggested 30-Second Pitch</div>
      <div class="helper-text">Tone: ${tone}</div>
      <textarea class="script-textarea" id="script-textarea"></textarea>
      <div class="btn-row">
        <button class="btn" onclick="copyScript()">Copy to Clipboard</button>
        <button class="btn" onclick="regenerateMeetingScript()">Regenerate</button>
      </div>
      <div id="script-footer"></div>
    </div>`;
  const textarea = document.getElementById("script-textarea");
  if (textarea) textarea.value = text.replace(/\*\*/g, "");
  renderActionFooter("script-footer", sourceIds);
}

function generateMeetingScript(options = {}) {
  const p = rankedProviders.find(provider => provider.id === selectedProviderId);
  if (!p) return;
  const { forceRefresh = false } = options;
  const tone = document.getElementById("tone-select")?.value || "Clinical / Data-Driven";
  const stakeholder = getStakeholderProfile(p);
  const sourceIds = getSourceIdsForProvider(p);
  const tempOutput = document.getElementById("script-output");
  if (!tempOutput) return;
  tempOutput.innerHTML = `
    <div class="ai-section" style="margin-top:16px">
      <div class="ai-label">Suggested 30-Second Pitch</div>
      <div class="helper-text">Drafting against the provider context and evidence set for this account.</div>
      <div class="ai-content" id="ai-script-content"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
    </div>`;
  const prompt = renderPromptTemplate(AI_ASSETS.meetingPitchPrompt, {
    provider_name: p.name,
    provider_specialty: p.specialty,
    provider_institution: p.institution,
    stakeholder_type: stakeholder.badge,
    recent_crm_context: getLatestInteraction(p)?.note || "No prior interaction",
    why_now: getWhyNow(p),
    tone
  });
  generateWithFallback({
    cacheKey:getCacheKey("script", p.id, tone),
    prompt,
    targetEl:document.getElementById("ai-script-content"),
    temperature:CONFIG.temps.scripts,
    sourceIds,
    localText:buildMeetingScriptLocal(p, tone),
    forceRefresh
  }).then(result => {
    if (!result.text) return;
    renderScriptResult(result.text, sourceIds, tone);
  });
}

function regenerateMeetingScript() {
  const p = rankedProviders.find(provider => provider.id === selectedProviderId);
  if (!p) return;
  const tone = document.getElementById("tone-select")?.value || "Clinical / Data-Driven";
  clearCachedContent(getCacheKey("script", p.id, tone));
  if (!isClaudeConnected()) {
    showToast("Claude is not connected. Demo mode uses a fixed local draft.");
  }
  generateMeetingScript({ forceRefresh: true });
}

function copyScript() {
  const ta = document.getElementById("script-textarea");
  if (ta) copyTextValue(ta.value, "Script copied to clipboard");
}

function getRelevantProducts(p) {
  const specialty = `${p.specialty} ${p.top_cancer_types.join(" ")}`.toLowerCase();
  if (isHemeProvider(p)) return ["xR", "TIME_Trial_Program", "Smart_Report"];
  if (p.specialty === "Pathology/Lab Director") return ["xT", "xR", "TIME_Trial_Program"];
  if (/(thoracic|nsclc|small cell|lung)/.test(specialty)) return ["xF", "xT", "xR"];
  if (/(sarcoma|pediatric|neuro|thyroid|rare tumor)/.test(specialty)) return ["xR", "xT", "TIME_Trial_Program"];
  if (p.primary_competitor === "Myriad Genetics") return ["xG", "xT", "xF"];
  if (p.primary_competitor === "Guardant Health") return ["xF", "xT", "xR"];
  if (p.primary_competitor === "Caris Life Sciences") return ["xT", "xR", "TIME_Trial_Program"];
  return ["xT", "TIME_Trial_Program", "Smart_Report"];
}

      `<button class="btn" onclick="copyGeneratedContent('${cacheKey}', 'Week plan copied')">Copy Week Plan</button>`

function exportPrepSheet() {
  const p = rankedProviders.find(provider => provider.id === selectedProviderId);
  if (!p) return;
  const playbook = p.playbook || getProviderPlaybook(p);
  const lines = [
    `TEMPUS MEETING PREP: ${p.name}, ${p.credentials}`,
    `Generated: ${new Date().toLocaleDateString()}`,
    ``,
    `PROVIDER: ${p.name}, ${p.credentials}`,
    `Title: ${p.title}`,
    `Institution: ${p.institution} (${p.hospital_system})`,
    `Specialty: ${p.specialty}`,
    `Cancer Focus: ${p.top_cancer_types.join(", ")}`,
    ``,
    `PRIORITY SCORE: ${p.score}/100`,
    `Relationship: ${p.tempus_relationship}`,
    `Monthly Patients: ${p.est_monthly_patients} | Genomic Eligible: ${p.est_genomic_eligible}`,
    `Current Tempus Volume: ${p.current_tempus_volume} | Competitor: ${p.primary_competitor} (${p.competitor_volume}/mo)`,
    `Payer Mix: ${p.payer_mix}`,
    ``,
    `WHY NOW: ${playbook.whyNow}`,
    `NEXT BEST ACTION: ${playbook.nextBestAction}`,
    `MEETING OBJECTIVE: ${playbook.meetingObjective}`,
    `STAKEHOLDER LENS: ${playbook.stakeholder.badge} - ${playbook.stakeholder.focus}`,
    `TEMPUS ANGLE: ${playbook.tempusAngle}`,
    `RISK: ${playbook.risk}`,
    ``
  ];
  if (p.recent_publications.length > 0) {
    lines.push("PUBLICATIONS:");
    p.recent_publications.forEach(pub => lines.push(`  - ${pub}`));
    lines.push("");
  }
  if (p.notes) {
    lines.push("CRM HISTORY:");
    p.notes.interactions.forEach(ix => {
      lines.push(`  [${ix.date}] ${ix.type} with ${ix.rep} (${ix.sentiment})`);
      lines.push(`  ${ix.note}`);
      if (ix.objections.length) lines.push(`  Objections: ${ix.objections.join(", ")}`);
      if (ix.next_steps.length) lines.push(`  Next steps: ${ix.next_steps.join("; ")}`);
      lines.push("");
    });
  }
  lines.push("REFERENCE PACK:");
  getSourceIdsForProvider(p).forEach(id => {
    if (SOURCE_LIBRARY[id]) lines.push(`  - ${SOURCE_LIBRARY[id].label}: ${SOURCE_LIBRARY[id].detail}`);
  });
  navigator.clipboard.writeText(lines.join("\n"));
  showToast("Prep sheet copied to clipboard");
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2500);
}

// Keyboard navigation

document.addEventListener("keydown", e => {
  // Skip if typing in input/textarea/select
  if (e.target.matches("input,textarea,select")) return;
  // Handle modal escape
  if (document.getElementById("modal-overlay").classList.contains("show")) {
    if (e.key === "Escape") hideModal();
    return;
  }

  const filtered = filterProviders();
  const currentIdx = filtered.findIndex(p => p.id === selectedProviderId);
  const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;

  switch (key) {
    case "j":
      e.preventDefault();
      if (currentIdx > 0) selectProvider(filtered[currentIdx - 1].id);
      break;
    case "k":
      e.preventDefault();
      if (currentIdx < filtered.length - 1) selectProvider(filtered[currentIdx + 1].id);
      break;
    case "ArrowDown":
      e.preventDefault();
      if (currentIdx < filtered.length - 1) selectProvider(filtered[currentIdx + 1].id);
      break;
    case "ArrowUp":
      e.preventDefault();
      if (currentIdx > 0) selectProvider(filtered[currentIdx - 1].id);
      break;
    case "1": switchTab("priority"); break;
    case "2": switchTab("objections"); break;
    case "3": switchTab("script"); break;
    case "g":
      if (activeTab === "script") generateMeetingScript();
      else if (activeTab === "priority") { const p = rankedProviders.find(p => p.id === selectedProviderId); if (p) generatePriorityRationale(p); }
      break;
  }
});

// Initialization

async function init() {
  await loadMockDataSources();
  await loadAiAssets();
  applyTheme(currentTheme);
  renderApp();
  applyTheme(currentTheme);
  applyPanelWidth(layoutState.leftPanelWidth);
  applyRightTopHeight(layoutState.rightTopHeight);
  setupPanelResizer();
  setupRightVerticalResizer();
  rankedProviders = computePriorityScores();
  renderSidebarTop();
  renderProviderList();
  updateApiStatus();
  window.addEventListener("resize", debounce(() => {
    applyPanelWidth(layoutState.leftPanelWidth);
    applyRightTopHeight(layoutState.rightTopHeight);
  }, 80));
  if (rankedProviders.length > 0) selectProvider(rankedProviders[0].id, { resetTab:true });
}

init();
